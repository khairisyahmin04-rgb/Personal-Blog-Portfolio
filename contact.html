<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevPortfolio | Contact</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo">MyDevSpace</div>
            <nav>
                <a href="index.html">Home</a>
                <a href="blog.html">Blog</a>
                <a href="contact.html" class="active">Contact</a>
                <button id="theme-toggle" class="btn-toggle">🌙 Mode</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="contact-section">
            <h1>Let's Connect</h1>
            <p>Have a question or want to collaborate on an interactive development project? Send over a message!</p>
            
            <form id="contact-form" onsubmit="alert('Thank you for reaching out! Your message was simulated successfully.'); return false;">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" required placeholder="Your Name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="yourname@example.com">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" required placeholder="Describe your project idea..."></textarea>
                </div>
                <button type="submit" class="btn">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 MyDevSpace. Built for UniSZA CSD 34203.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
